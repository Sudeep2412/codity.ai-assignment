version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codity-postgres
    environment:
      POSTGRES_DB: codity_jobs
      POSTGRES_USER: codity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codity_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codity -d codity_jobs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codity-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
